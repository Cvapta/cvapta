<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bye</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    img {
      display: block;
      max-width: min(320px, 80vw);
      max-height: 80vh;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <img src="icon.png" alt="icon" draggable="false" />
  <audio id="bgMusic" src="no.mp3" autoplay loop></audio>

  <script>
    const audio = document.getElementById('bgMusic');

    async function tryPlay() {
      try {
        await audio.play();
      } catch (error) {
        document.addEventListener('click', async () => {
          try {
            await audio.play();
          } catch (e) {}
        }, { once: true });
      }
    }

    window.addEventListener('load', tryPlay);
  </script>
</body>
</html>
